syntax = "proto3";

package comment;

option go_package = "comment/gen;commentpb";

service CommentService {
  rpc PostComment(PostCommentRequest) returns (Comment);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  rpc ReplyToComment(ReplyToCommentRequest) returns (Comment);
}

message Comment {
  string id = 1;
  string campaign_id = 2;
  string author_sub = 3;
  string author_name = 4;
  string text = 5;
  string parent_id = 6;
  int64 created_at = 7;
}

message PostCommentRequest {
  string campaign_id = 1;
  string author_sub = 2;
  string author_name = 3;
  string text = 4;
}

message ListCommentsRequest {
  string campaign_id = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}

message ListCommentsResponse {
  repeated Comment items = 1;
  int64 total = 2;
}

message ReplyToCommentRequest {
  string parent_id = 1;
  string author_sub = 2;
  string author_name = 3;
  string text = 4;
}
