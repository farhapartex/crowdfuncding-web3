services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      RPC_URL: http://host.docker.internal:8545
      COMMENT_SERVICE_ADDR: comment:50051
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - comment
    extra_hosts:
      - "host.docker.internal:host-gateway"

  comment:
    build: ./comment
    env_file:
      - ./comment/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      - postgres

volumes:
  postgres_data:
    name: backend_postgres_data
